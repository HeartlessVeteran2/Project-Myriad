name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ================================
  # Code Quality & Security Checks
  # ================================
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci
          cd ../mobile && npm ci

      - name: Lint Backend
        run: cd backend && npm run lint

      - name: Lint Frontend
        run: cd frontend && npm run lint

      - name: Lint Mobile
        run: cd mobile && npm run lint

      - name: Type Check (if TypeScript)
        run: |
          cd backend && npm run type-check || true
          cd ../frontend && npm run type-check || true

      - name: Security Audit
        run: |
          npm audit --audit-level moderate
          cd backend && npm audit --audit-level moderate
          cd ../frontend && npm audit --audit-level moderate
          cd ../mobile && npm audit --audit-level moderate

      - name: Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Project-Myriad'
          path: '.'
          format: 'ALL'

      - name: Upload Dependency Check results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ================================
  # Backend Testing
  # ================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: quality-checks

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: myriad_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Wait for services
        run: |
          sleep 10
          mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ptest_password
          redis-cli -h 127.0.0.1 -p 6379 ping

      - name: Run database migrations
        run: cd backend && npm run migrate
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: myriad_test
          DB_USER: root
          DB_PASSWORD: test_password
          REDIS_URL: redis://127.0.0.1:6379

      - name: Run unit tests
        run: cd backend && npm run test:unit
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: myriad_test
          DB_USER: root
          DB_PASSWORD: test_password
          REDIS_URL: redis://127.0.0.1:6379

      - name: Run integration tests
        run: cd backend && npm run test:integration
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: myriad_test
          DB_USER: root
          DB_PASSWORD: test_password
          REDIS_URL: redis://127.0.0.1:6379

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          name: backend-coverage

  # ================================
  # Frontend Testing
  # ================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test

  # ================================
  # Mobile Testing
  # ================================
  test-mobile:
    name: Mobile Tests
    runs-on: macos-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install mobile dependencies
        run: cd mobile && npm ci

      - name: Run mobile tests
        run: cd mobile && npm test

  # ================================
  # Build & Push Docker Image
  # ================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-mobile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ================================
  # Deploy to Production
  # ================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to production environment
        run: echo "Deploying to production..."
        # Add your deployment script here
