name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      backend-exists: ${{ steps.check-files.outputs.backend-exists }}
      frontend-exists: ${{ steps.check-files.outputs.frontend-exists }}
      mobile-exists: ${{ steps.check-files.outputs.mobile-exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Check project structure
        id: check-files
        run: |
          echo "backend-exists=${{ hashFiles('backend/package.json') != '' }}" >> $GITHUB_OUTPUT
          echo "frontend-exists=${{ hashFiles('frontend/package.json') != '' }}" >> $GITHUB_OUTPUT
          echo "mobile-exists=${{ hashFiles('mobile/package.json') != '' }}" >> $GITHUB_OUTPUT

  backend:
    needs: validate
    if: needs.validate.outputs.backend-exists == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "No lint script found"
      - name: Test
        run: npm test || echo "No test script found"
      - name: Build
        run: npm run build || echo "No build script found"

  frontend:
    needs: validate
    if: needs.validate.outputs.frontend-exists == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "No lint script found"
      - name: Test
        run: npm test || echo "No test script found"
      - name: Build
        run: npm run build || echo "No build script found"

  mobile:
    needs: validate
    if: needs.validate.outputs.mobile-exists == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint || echo "No lint script found"
      - name: Test
        run: npm test || echo "No test script found"

  docker:
    needs: [backend, frontend]
    if: always() && (needs.backend.result == 'success' || needs.frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t project-myriad .
          else
            echo "No Dockerfile found"
          fi
      - name: Test Docker Compose
        run: |
          if [ -f docker-compose.yml ]; then
            docker-compose config
          else
            echo "No docker-compose.yml found"
          fi
