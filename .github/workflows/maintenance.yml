name: Repository Maintenance

on:
  schedule:
    - cron: '0 2 * * 0' # Weekly on Sunday at 2 AM
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clean up old branches
        run: |
          # Delete merged branches older than 30 days
          git for-each-ref --format='%(refname:short) %(committerdate)' refs/remotes/origin | \
          while read branch date; do
            if [[ "$branch" != "origin/main" && "$branch" != "origin/develop" ]]; then
              branch_name=${branch#origin/}
              if git merge-base --is-ancestor origin/$branch_name origin/main; then
                echo "Deleting merged branch: $branch_name"
                git push origin --delete $branch_name || true
              fi
            fi
          done

      - name: Update documentation
        run: |
          # Auto-update README badges and stats
          echo "Updating repository statistics..."

      - name: Optimize repository
        run: |
          # Clean up git history and optimize
          git gc --aggressive --prune=now

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run security audit
        run: |
          npm audit --audit-level high
          npm audit fix --force || true

  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update all dependencies
        run: |
          npx npm-check-updates -u
          npm install
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: update dependencies" || exit 0
          git push
