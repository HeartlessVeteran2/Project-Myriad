name: Release Management

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from git commits
          echo "## Changes" > CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build all projects
        run: |
          npm ci
          npm run build --if-present --prefix backend
          npm run build --if-present --prefix frontend
          npm run build --if-present --prefix mobile

      - name: Create archive
        run: |
          tar -czf project-myriad-${{ github.ref_name }}.tar.gz \
            backend/dist \
            frontend/dist \
            mobile/dist \
            package.json \
            README.md \
            LICENSE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-myriad-${{ github.ref_name }}
          path: project-myriad-${{ github.ref_name }}.tar.gz
