name: Auto-merge PRs

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event.review.state == 'approved' || github.event.check_suite.conclusion == 'success') &&
      github.event.pull_request.user.login != 'renovate[bot]'
    steps:
      - name: Get PR data
        id: pr-data
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_request_number: context.issue.number
            });
            return pr.data;

      - name: Check mergeability
        id: merge-check
        if: steps.pr-data.outputs.result
        uses: actions/github-script@v7
        with:
          script: |
            const pr = JSON.parse('${{ steps.pr-data.outputs.result }}');
            if (pr.merged || pr.draft || !pr.mergeable) {
              console.log('PR is not in a mergeable state.');
              return false;
            }
            console.log('PR is mergeable.');
            return true;

      - name: Merge and cleanup
        if: steps.merge-check.outputs.result == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
