name: Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      backend-exists: ${{ steps.check.outputs.backend-exists }}
      frontend-exists: ${{ steps.check.outputs.frontend-exists }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check project structure
        id: check
        run: |
          echo "backend-exists=${{ hashFiles('backend/package.json') != '' }}" >> $GITHUB_OUTPUT
          echo "frontend-exists=${{ hashFiles('frontend/package.json') != '' }}" >> $GITHUB_OUTPUT
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install and test backend
        if: steps.check.outputs.backend-exists == 'true'
        run: |
          cd backend
          npm ci || npm install
          npm test || echo "No tests configured"
          npm run build || echo "No build script"
      
      - name: Install and build frontend
        if: steps.check.outputs.frontend-exists == 'true'
        run: |
          cd frontend
          npm ci || npm install
          npm test || echo "No tests configured"
          npm run build || echo "No build script"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            backend/dist/
            frontend/dist/
            frontend/build/
          retention-days: 30

  deploy-staging:
    if: |
      github.ref == 'refs/heads/main' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: 
      name: staging
      url: https://staging.project-myriad.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
      
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging environment"
          echo "Build SHA: ${{ github.sha }}"
          echo "Environment: staging"
          # Add your actual staging deployment commands here
          # Examples:
          # - rsync files to staging server
          # - Update staging containers
          # - Run database migrations
      
      - name: Health check
        run: |
          echo "Performing health check on staging environment"
          # Add health check commands here

  deploy-production:
    if: |
      startsWith(github.ref, 'refs/tags/v') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: 
      name: production
      url: https://project-myriad.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
      
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production environment"
          echo "Build SHA: ${{ github.sha }}"
          echo "Environment: production"
          # Add your actual production deployment commands here
      
      - name: Health check
        run: |
          echo "Performing health check on production environment"
          # Add health check commands here
      
      - name: Notify success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          # Add notification logic (Discord, Slack, etc.)
