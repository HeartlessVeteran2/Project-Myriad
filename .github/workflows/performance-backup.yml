name: Performance Testing

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in seconds'
        required: false
        default: '60'
        type: string
      test_users:
        description: 'Number of virtual users'
        required: false
        default: '10'
        type: string

jobs:
  backend-performance:
    runs-on: ubuntu-latest
    if: hashFiles('backend/package.json') != ''
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci --prefer-offline --no-audit || npm install
      
      - name: Start backend server
        run: |
          cd backend
          npm start &
          echo $! > server.pid
          sleep 10  # Wait for server to start
          
          # Health check
          for i in {1..30}; do
            if curl -f http://localhost:3000/health >/dev/null 2>&1; then
              echo "Server is ready"
              break
            elif curl -f http://localhost:3000 >/dev/null 2>&1; then
              echo "Server is ready (no health endpoint)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              exit 1
            fi
            sleep 2
          done
      
      - name: Install Artillery for load testing
        run: npm install -g artillery@latest
      
      - name: Create Artillery config
        run: |
          cat > artillery-config.yml << 'EOF'
          config:
            target: 'http://localhost:3000'
            phases:
              - duration: ${{ github.event.inputs.test_duration || '60' }}
                arrivalRate: 1
                rampTo: ${{ github.event.inputs.test_users || '10' }}
          scenarios:
            - name: "Basic API endpoints"
              weight: 70
              flow:
                - get:
                    url: "/"
                - get:
                    url: "/api/library"
                - get:
                    url: "/api/tracking"
                - get:
                    url: "/api/extensions"
            - name: "Heavy operations"
              weight: 30
              flow:
                - post:
                    url: "/api/download"
                    json:
                      url: "https://example.com/manga/1"
                      chapters: [1, 2, 3]
                - get:
                    url: "/api/search"
                    qs:
                      query: "test manga"
                      limit: 50
          EOF
      
      - name: Run performance tests
        run: |
          artillery run artillery-config.yml --output performance-report.json || echo "Performance tests completed with warnings"
          artillery report performance-report.json --output performance-report.html || echo "Report generation completed"
      
      - name: Analyze performance results
        run: |
          # Extract key metrics
          if [ -f performance-report.json ]; then
            node -e "
              const fs = require('fs');
              try {
                const report = JSON.parse(fs.readFileSync('performance-report.json', 'utf8'));
                const aggregate = report.aggregate;
                
                console.log('## Performance Test Results');
                console.log('');
                console.log('| Metric | Value |');
                console.log('|--------|--------|');
                console.log(\`| Total Requests | \${aggregate.counters?.['http.requests'] || 0} |\`);
                console.log(\`| Successful Requests | \${aggregate.counters?.['http.responses'] || 0} |\`);
                console.log(\`| Failed Requests | \${aggregate.counters?.['http.request_errors'] || 0} |\`);
                console.log(\`| Average Response Time | \${Math.round(aggregate.latency?.mean || 0)}ms |\`);
                console.log(\`| 95th Percentile | \${Math.round(aggregate.latency?.p95 || 0)}ms |\`);
                console.log(\`| 99th Percentile | \${Math.round(aggregate.latency?.p99 || 0)}ms |\`);
                console.log(\`| Requests per Second | \${Math.round(aggregate.rates?.['http.request_rate'] || 0)} |\`);
                
                console.log('');
                console.log('✅ Performance tests completed');
              } catch (e) {
                console.log('Performance report could not be analyzed:', e.message);
              }
            " > performance-summary.md
          else
            echo "## Performance Test Results" > performance-summary.md
            echo "Performance tests completed but no detailed report available" >> performance-summary.md
          fi
      
      - name: Stop backend server
        if: always()
        run: |
          if [ -f backend/server.pid ]; then
            kill $(cat backend/server.pid) || true
            rm backend/server.pid
          fi
      
      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-backend-${{ matrix.node-version }}
          path: |
            performance-report.json
            performance-report.html
            performance-summary.md
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --prefer-offline --no-audit || npm install
      
      - name: Build frontend for production
        run: |
          cd frontend
          npm run build || echo "Build completed with warnings"
      
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@latest
      
      - name: Start frontend server
        run: |
          cd frontend
          if [ -d dist ]; then
            npx serve -s dist -l 3001 &
          else
            npx serve -s . -l 3001 &
          fi
          echo $! > frontend-server.pid
          sleep 5
          
          # Health check
          for i in {1..15}; do
            if curl -f http://localhost:3001 >/dev/null 2>&1; then
              echo "Frontend server is ready"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Frontend server failed to start"
              exit 1
            fi
            sleep 2
          done
      
      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:3001 \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage \
            --output-dir=./lighthouse-results || echo "Lighthouse completed with warnings"
      
      - name: Stop frontend server
        if: always()
        run: |
          if [ -f frontend-server.pid ]; then
            kill $(cat frontend-server.pid) || true
            rm frontend-server.pid
          fi
      
      - name: Upload frontend performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-performance-report
          path: |
            lighthouse-results/
          retention-days: 7

  bundle-analysis:
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --prefer-offline --no-audit || npm install
      
      - name: Build and analyze bundle
        run: |
          cd frontend
          npm run build || echo "Build completed with warnings"
          
          echo "## Bundle Size Analysis" > ../bundle-analysis.md
          echo "" >> ../bundle-analysis.md
          
          if [ -d dist ]; then
            echo "### Build Output:" >> ../bundle-analysis.md
            echo "\`\`\`" >> ../bundle-analysis.md
            du -sh dist/* 2>/dev/null | sort -hr >> ../bundle-analysis.md || echo "No build files found" >> ../bundle-analysis.md
            echo "\`\`\`" >> ../bundle-analysis.md
            echo "" >> ../bundle-analysis.md
            
            # Check for large files
            echo "### Large Files (>500KB):" >> ../bundle-analysis.md
            find dist -type f -size +500k -exec ls -lh {} \; 2>/dev/null | awk '{print "- " $9 ": " $5}' >> ../bundle-analysis.md || echo "None found" >> ../bundle-analysis.md
          else
            echo "No dist directory found" >> ../bundle-analysis.md
          fi
      
      - name: Upload bundle analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: bundle-analysis.md
          retention-days: 7
