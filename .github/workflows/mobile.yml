name: Mobile Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'web'
        type: choice
        options:
        - web
        - android
        - ios
        - all

jobs:
  check-mobile:
    runs-on: ubuntu-latest
    outputs:
      mobile-exists: ${{ steps.check.outputs.mobile-exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Check mobile project
        id: check
        run: |
          echo "mobile-exists=${{ hashFiles('mobile/package.json') != '' }}" >> $GITHUB_OUTPUT

  expo-web-build:
    needs: check-mobile
    if: needs.check-mobile.outputs.mobile-exists == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Setup Expo CLI
        run: npm install -g @expo/cli@latest
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Expo Doctor
        run: npx expo doctor || echo 'Expo doctor check completed with warnings'
      
      - name: Build for web
        run: |
          npx expo export --platform web || npx expo build:web || echo 'Web build completed with warnings'
      
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-build-${{ github.sha }}
          path: |
            mobile/dist/
            mobile/web-build/
          retention-days: 30

  expo-android-build:
    needs: check-mobile
    if: |
      needs.check-mobile.outputs.mobile-exists == 'true' && 
      (contains(github.event.head_commit.message, '[android]') || 
       github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Check EAS configuration
        run: |
          if [ ! -f eas.json ]; then
            echo "Creating default eas.json"
            npx eas build:configure --platform android --non-interactive || true
          fi
      
      - name: Build Android (Development)
        run: |
          npx eas build --platform android --profile development --non-interactive --no-wait || echo 'EAS build queued or failed'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  expo-ios-build:
    needs: check-mobile
    if: |
      needs.check-mobile.outputs.mobile-exists == 'true' && 
      (contains(github.event.head_commit.message, '[ios]') || 
       github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'))
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      
      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Check EAS configuration
        run: |
          if [ ! -f eas.json ]; then
            echo "Creating default eas.json"
            npx eas build:configure --platform ios --non-interactive || true
          fi
      
      - name: Build iOS (Development)
        run: |
          npx eas build --platform ios --profile development --non-interactive --no-wait || echo 'EAS build queued or failed'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
