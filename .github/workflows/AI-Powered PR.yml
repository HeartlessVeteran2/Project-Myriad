# This workflow provides a comprehensive set of PR automations
# to streamline the development process.
name: AI-Powered PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write  # required for the labeler job

jobs:
  # 1️⃣ Automatic Rebase
  auto-rebase:
    name: Automatic Rebase
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cirrus-actions/rebase@1.8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # 2️⃣ Lint, Format & Test
  lint-format-and-test:
    name: Lint, Format & Test
    needs: auto-rebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: |
          npm run lint -- --fix
          npm run format -- --write
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: apply automatic linting and formatting'
          file_pattern: '**/*.{js,ts,jsx,tsx,json,md}'
      - run: npm test  # replace with your test command

  # 3️⃣ Dependency Vulnerability Review
  dependency-review:
    name: Dependency Vulnerability Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  # 4️⃣ AI Code Review
  ai-code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: marocchino/AI-Codereviewer@v1.2.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: "gpt-4"
          TEMPERATURE: 0.5

  # 5️⃣ Automatic Labeler
  labeler:
    name: Auto Labeler
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  # 6️⃣ Auto-Merge Dependabot
  auto-merge:
    name: Auto-Merge Dependabot
    needs: [lint-format-and-test, dependency-review]
    if: github.actor == 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    steps:
      - uses: pascalgn/automerge-action@v0.16.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
